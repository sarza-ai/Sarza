<text x="300" y="448" text-anchor="middle" class="wm" font-size="78" fill="#F5E6C8">SARZA<tspan fill="url(#ai)"> AI</tspan></text>
<text x="300" y="490" text-anchor="middle" class="tag" font-size="16" letter-spacing="5" fill="#C9925A">SARZA AI INTEGRATION SPECIALISTS</text>
