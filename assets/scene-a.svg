<g stroke="#7fd4d4" stroke-width="1.2" opacity="0.18"><line x1="0" y1="566" x2="1600" y2="566"/></g>
<rect x="0" y="560" width="1600" height="440" fill="url(#floorfade-a)"/>

<!-- horizon glow line -->
<rect x="0" y="557" width="1600" height="6" fill="#E8A85A" opacity="0.6" filter="url(#blur-a)"/>

<!-- dune horizon -->
