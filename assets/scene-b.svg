    <stop offset="1" stop-color="#1A1008" stop-opacity="0.7"/>
  </radialGradient>
  <linearGradient id="floorfade-b" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#1A1008" stop-opacity="0"/>
    <stop offset="1" stop-color="#1A1008" stop-opacity="0.85"/>
  </linearGradient>
  <filter id="blur-b" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="9"/>
  </filter>
  <mask id="sunmask-b">
    <circle cx="480" cy="520" r="178" fill="#fff"/>
    <rect x="292" y="560" width="376" height="6" fill="#000"/><rect x="292" y="580" width="376" height="7" fill="#000"/><rect x="292" y="602" width="376" height="9" fill="#000"/><rect x="292" y="628" width="376" height="11" fill="#000"/><rect x="292" y="658" width="376" height="13" fill="#000"/><rect x="292" y="692" width="376" height="16" fill="#000"/><rect x="292" y="730" width="376" height="20" fill="#000"/>
  </mask>
