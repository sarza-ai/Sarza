<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Futuristic desert landscape with a retro sun and tech grid">
<defs>
  <linearGradient id="sky-b" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#1a0f10"/>
    <stop offset="0.55" stop-color="#2c1a12"/>
    <stop offset="0.78" stop-color="#3a2410"/>
    <stop offset="1" stop-color="#1A1008"/>
  </linearGradient>
  <linearGradient id="sun-b" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#FFE3A6"/>
    <stop offset="0.5" stop-color="#D4822A"/>
    <stop offset="1" stop-color="#A0522D"/>
  </linearGradient>
  <radialGradient id="glow-b" cx="50%" cy="50%" r="50%">
